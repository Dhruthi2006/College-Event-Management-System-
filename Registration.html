<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Registration</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #f8f9fa;
        }

        .registration-form {
            max-width: 700px;
            margin: 50px auto;
        }

        #successMessage {
            display: none;
        }
    </style>
</head>

<body>
    <nav class="navbar navbar-expand-md navbar-dark bg-dark">
        <div class="container">
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a href="Home.html" class="nav-link">Home</a>
                    </li>

                    <li class="nav-item">
                        <a href="events.html" class="nav-link">Events</a>
                    </li>

                    <li class="nav-item">
                        <a href="gallery.html" class="nav-link">Gallery</a>
                    </li>

                    <li class="nav-item">
                        <a href="Registration.html" class="nav-link">Register Now</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="schedule.html">
                            Schedule
                        </a>
                    </li>


                    <li class="nav-item">
                        <a href="contact.html" class="nav-link">Contact</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>


    <div class="container registration-form">
        <div class="card shadow">
            <div class="card-header bg-primary text-white text-center">
                <h2>Event Registration Form</h2>
            </div>

            <div class="card-body">
                <form id="eventForm">

                    <div class="mb-3">
                        <label class="form-label">Student Name</label>
                        <input type="text" class="form-control" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Roll Number</label>
                        <input type="text" class="form-control" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Branch</label>
                        <select class="form-select" required>
                            <option value="">Select Branch</option>
                            <option>CSE</option>
                            <option>CSM</option>
                            <option>ECE</option>
                            <option>EEE</option>
                            <option>Mechanical</option>
                            <option>Civil</option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        <input type="email" class="form-control" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Mobile Number</label>
                        <input type="tel" class="form-control" pattern="[0-9]{10}" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Event Selection</label>
                        <select class="form-select" required>
                            <option value="">Select Event</option>
                            <option>Technical Quiz</option>
                            <option>Hackathon</option>
                            <option>Poster Presentation</option>
                            <option>Coding Contest</option>
                            <option>Project Expo</option>
                            <option>Cultural Fest</option>
                        </select>
                    </div>

                    <button type="submit" class="btn btn-success w-100">
                        Register
                    </button>

                </form>

                <div id="successMessage" class="alert alert-success mt-4 text-center">
                    <h4>Registration Successful!</h4>
                    <p>Thank you for registering for the event.</p>
                </div>

            </div>
        </div>
    </div>

    <script>
        document.getElementById("eventForm").addEventListener("submit", function (e) {
            e.preventDefault();

            document.getElementById("successMessage").style.display = "block";

            this.reset();
        });
    </script>

</body>

</html>
